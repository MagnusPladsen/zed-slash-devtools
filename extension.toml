id = "zed-slash-devtools"
name = "Slash Devtools"
description = "Developer slash commands for Zed's AI assistant — /todo, /deps, /stack, /recent"
version = "0.1.0"
schema_version = 1
authors = ["Magnus Pladsen <magnus_pladsen@hotmail.com>"]
repository = "https://github.com/MagnusPladsen/zed-slash-devtools"

[slash_commands.todo]
description = "Scan workspace for TODO, FIXME, HACK, and BUG comments"
requires_argument = false

[slash_commands.deps]
description = "List project dependencies from package.json, Cargo.toml, or requirements.txt"
requires_argument = false

[slash_commands.stack]
description = "Detect and summarize the project's tech stack"
requires_argument = false

[slash_commands.recent]
description = "Show recent git commits with diffs"
requires_argument = false
